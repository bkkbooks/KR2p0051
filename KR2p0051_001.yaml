body:
  text: 日食公之社隰朋與鮑叔牙從日既公問二大夫日之食也曷為鮑叔牙答曰眚變災曰為齊競言愆曰多鮑叔牙答曰害將來將有兵有憂於公身公曰然則可説歟隰朋答曰公身競為亡道不遷於善而説之可乎哉公曰甚哉吾不賴二三子不謫怒寡人至於使日食鮑叔牙競與隰朋曰群臣之罪也昔高宗祭有雉雊於彝前詔祖己而問焉曰是何也祖己答曰昔先君競格告王天不見害地不生孽則訴諸鬼神曰天地盟明棄我矣近臣不諫遠者不謗則攸諸鄉競里含今此祭之得福者也請禳之以衰汲既祭之後焉修先王之法高宗命傅説禳之以競祭既祭焉命行先王之法發故度行故作廢作者死弗行者死不出三年狄人之附者七百競邦此能從善而去過者公曰吾不知其為不善也今內之不得百姓外之為諸侯笑寡人之不競肖也豈不二子之憂也哉隰朋與鮑叔牙皆拜起而言曰公身為亡道擁華孟子以馳於郳競廷驅逐畋弋無期度隰朋與鮑叔牙皆拜起而言曰公身為亡道擁華孟子以馳於郳競廷驅逐畋弋無期度士民獵樂篤愒倍忨疲弊齊邦日成逞于縱弗顧前後百鮑姓皆怨恨奄然將亡公弗詰蠲禁除臣雖欲訐或不得見公胡弗察人之性三食色愒今豎刁匹夫而欲鮑知萬乘之邦而潰朘其為災也深矣易牙人之邪者而食人其為不仁厚矣公弗圖必害公身公曰然則奚鮑如鮑叔牙答曰齊邦至惡死而上繆其刑至欲食而上厚其斂至惡苛而上不時使公乃身命祭有司祭服毋黹鮑器必蠲潔毋內殘器犧牲圭璧必全如故加之以敬乃命有司書籍復老弱不刑畝纆短田纆長百量鍾命鮑九月除路十月而徒梁成一之日而車梁成乃命百有司曰有夏氏觀其容以使及其亡也皆偽其容殷人之所以代之觀其容聽其鮑言凡其所以亡偽其容偽其言周人之所以代之觀其容聽其言考實者使凡其所以衰亡忘其考實也二三子勉之寡人將考實鮑
